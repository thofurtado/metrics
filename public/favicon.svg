<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="-2 -2 28 28" fill="none">
  <defs>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1E3A8A" flood-opacity="0.4" />
    </filter>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="1" />
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="1" />
    </linearGradient>

    <linearGradient id="leftFaceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="rightFaceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.4" />
    </linearGradient>
  </defs>

  <g filter="url(#dropShadow)">
    <path 
      d="M 12 2 L 3 17 L 12 22 Z" 
      fill="url(#leftFaceGrad)" 
      stroke="url(#borderGrad)" 
      stroke-width="1.5" 
      stroke-linejoin="round" 
    />
    <path 
      d="M 12 2 L 21 17 L 12 22 Z" 
      fill="url(#rightFaceGrad)" 
      stroke="url(#borderGrad)" 
      stroke-width="1.5" 
      stroke-linejoin="round" 
    />
  </g>
</svg>
